name: pillmate
description: "PillMate - Medication Management App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.10+1
  flutter_screenutil: ^5.9.3
  gap: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: "ic_launcher"       # overwrites android/app/src/main/res/mipmap-*/ic_launcher.png
  ios: true                    # overwrites ios/Runner/Assets.xcassets/AppIcon.appiconset/
  image_path: "assets/images/app_icon.png"          # white-bg PNG for iOS + non-adaptive Android
  min_sdk_android: 21          # enables adaptive icon support (API 26+)
  adaptive_icon_background: "#FFFFFF"               # white background layer
  adaptive_icon_foreground: "assets/images/app_icon_fg.png"  # transparent-bg PNG for foreground layer
  remove_alpha_ios: true       # iOS rejects icons with transparency; flatten to white

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.svg
    - assets/images/Frame.svg
    - assets/images/Frame2.svg
    - assets/images/Group.svg
